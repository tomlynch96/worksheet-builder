<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="6" stdDeviation="6" flood-color="#00000033"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="#00000028"/>
    </filter>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#00000020"/>
    </filter>

    <!-- Tiny torn paper bits -->
    <rect id="bit1" width="28" height="22" rx="3" fill="#ffffff" stroke="#222" stroke-width="2"/>
    <rect id="bit2" width="18" height="24" rx="2" fill="#f5f5f5" stroke="#222" stroke-width="2"/>
    <rect id="bit3" width="22" height="16" rx="2" fill="#eeeeee" stroke="#222" stroke-width="1.5"/>
    <rect id="bit4" width="14" height="18" rx="2" fill="#ffffff" stroke="#222" stroke-width="1.5"/>
    <rect id="bit5" width="30" height="18" rx="3" fill="#f8f8f8" stroke="#222" stroke-width="2"/>
    <rect id="bit6" width="16" height="26" rx="2" fill="#ebebeb" stroke="#222" stroke-width="1.5"/>
    <rect id="bit7" width="24" height="14" rx="2" fill="#f0f0f0" stroke="#222" stroke-width="1.5"/>
    <rect id="bit8" width="20" height="20" rx="3" fill="#fafafa" stroke="#222" stroke-width="2"/>
    <rect id="bit9" width="26" height="16" rx="2" fill="#e8e8e8" stroke="#222" stroke-width="1.5"/>
    <rect id="bit10" width="12" height="20" rx="2" fill="#ffffff" stroke="#222" stroke-width="1.5"/>
    <rect id="bit11" width="34" height="20" rx="3" fill="#f2f2f2" stroke="#222" stroke-width="2"/>
    <rect id="bit12" width="18" height="28" rx="3" fill="#eeeeee" stroke="#222" stroke-width="1.5"/>
  </defs>

  <!-- Background -->

  <!-- ===================== -->
  <!-- PAPER SHEET 1 (back)  -->
  <!-- ===================== -->
  <g id="paper1" filter="url(#shadow3)">
    <!-- Initial: back-left position. Shuffles then flies away -->
    <animateTransform attributeName="transform" type="translate"
      values="
        155,120;
        155,120;
        110,80;
        175,135;
        145,110;
        155,120;
        155,120;
        155,120;
        -200,-400
      "
      keyTimes="0; 0.05; 0.18; 0.28; 0.38; 0.48; 0.55; 0.65; 1"
      calcMode="spline"
      keySplines="0 0 1 1; .4 0 .2 1; .4 0 .2 1; .4 0 .2 1; .4 0 .2 1; 0 0 1 1; 0 0 1 1; .4 0 .1 1"
      dur="3.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate"
      values="-8; -8; -18; -4; -12; -8; -8; -8; -55"
      keyTimes="0; 0.05; 0.18; 0.28; 0.38; 0.48; 0.55; 0.65; 1"
      calcMode="spline"
      keySplines="0 0 1 1; .4 0 .2 1; .4 0 .2 1; .4 0 .2 1; .4 0 .2 1; 0 0 1 1; 0 0 1 1; .4 0 .1 1"
      dur="3.8s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity"
      values="1;1;1;1;1;1;1;1;0"
      keyTimes="0;0.05;0.18;0.28;0.38;0.48;0.55;0.75;1"
      dur="3.8s" repeatCount="indefinite"/>
    <rect x="0" y="0" width="310" height="390" rx="26" ry="26"
      fill="#ffffff" stroke="#111111" stroke-width="16"/>
    <!-- lines on paper -->
    <line x1="40" y1="80" x2="270" y2="80" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="120" x2="270" y2="120" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="160" x2="200" y2="160" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="200" x2="230" y2="200" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="240" x2="180" y2="240" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="280" x2="250" y2="280" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="320" x2="210" y2="320" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
  </g>

