      keyTimes="0; 0.05; 0.18; 0.28; 0.38; 0.48; 0.55; 0.65; 1"
      calcMode="spline"
      keySplines="0 0 1 1; .4 0 .2 1; .4 0 .2 1; .4 0 .2 1; .4 0 .2 1; 0 0 1 1; 0 0 1 1; .4 0 .1 1"
