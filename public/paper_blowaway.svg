    <line x1="40" y1="120" x2="215" y2="120" stroke="#ccc" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="160" x2="250" y2="160" stroke="#ccc" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="200" x2="270" y2="200" stroke="#ccc" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="240" x2="200" y2="240" stroke="#ccc" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="280" x2="260" y2="280" stroke="#ccc" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="320" x2="230" y2="320" stroke="#ccc" stroke-width="6" stroke-linecap="round"/>
  </g>

