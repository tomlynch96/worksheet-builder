    <rect x="0" y="0" width="310" height="390" rx="26" ry="26"
      fill="#f7f7f7" stroke="#111111" stroke-width="16"/>
    <line x1="40" y1="80" x2="270" y2="80" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="120" x2="240" y2="120" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="160" x2="270" y2="160" stroke="#ddd" stroke-width="6" stroke-linecap="round"/>
